services:
  # ── Firebase Emulator Suite ────────────────────────────────────────────
  firebase-emulators:
    image: andreysenov/firebase-tools:latest-node-20
    command: >
      firebase emulators:start
      --only auth,firestore,database,storage
      --project=quartinho-dev
      --export-on-exit=/data
      --import=/data
    user: "0:0"
    working_dir: /firebase
    volumes:
      - ./firebase.json:/firebase/firebase.json:ro
      - ./firebase:/firebase/firebase:ro
      - ./.firebase-data:/data
    ports:
      - "9099:9099"
      - "8085:8080"
      - "9000:9000"
      - "9199:9199"
      - "4000:4000"
      - "4400:4400"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4400/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── API (Express + Firebase Admin) ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bun run --watch api/src/index.ts
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: "3001"
      FIREBASE_PROJECT_ID: quartinho-dev
      GCLOUD_PROJECT: quartinho-dev
      # Container→container: use service DNS, not localhost.
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulators:9099
      FIRESTORE_EMULATOR_HOST: firebase-emulators:8080
      FIREBASE_DATABASE_EMULATOR_HOST: firebase-emulators:9000
      FIREBASE_STORAGE_EMULATOR_HOST: firebase-emulators:9199
      FIREBASE_DATABASE_URL: http://firebase-emulators:9000/?ns=quartinho-dev
      FIREBASE_STORAGE_BUCKET: quartinho-dev.appspot.com
      MUSICBRAINZ_USER_AGENT: Quartinho/1.0 (dev@localhost)
      # Brevo is bypassed in dev; for integration tests use MailDev (profile: test)
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-dev@quartinho.local}
      # MinIO (S3 local) — API connects via Docker DNS, public URLs via host port
      MINIO_ENDPOINT: http://minio:9000
      R2_PUBLIC_URL: http://localhost:9002
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      firebase-emulators:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully

  # ── Web (Vite + React) ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bun run --filter=web dev -- --host 0.0.0.0
    working_dir: /app
    environment:
      VITE_USE_EMULATOR: "true"
      # Browser hits the api via host port mapping → localhost, not container DNS.
      VITE_API_URL: http://localhost:3001
      VITE_FIREBASE_CONFIG: >-
        {"apiKey":"fake-dev-key","authDomain":"quartinho-dev.firebaseapp.com","projectId":"quartinho-dev","storageBucket":"quartinho-dev.appspot.com","messagingSenderId":"0","appId":"dev","databaseURL":"http://localhost:9000/?ns=quartinho-dev"}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── MinIO (S3-compatible local storage) ─────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/qbh;
      mc anonymous set download local/qbh;
      "

  # ── MailDev (SMTP mock for email testing) ─────────────────────────────
  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - "1025:1025"   # SMTP
      - "1080:1080"   # Web UI
    profiles:
      - test

volumes:
  node_modules:
  minio-data:
