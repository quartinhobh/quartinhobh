name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  preflight:
    name: Preflight (real Firestore index check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write preflight service account
        run: echo '${{ secrets.PREFLIGHT_FIREBASE_SERVICE_ACCOUNT }}' > /tmp/preflight-sa.json

      - name: Deploy committed indexes to preflight project
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/preflight-sa.json
        run: bunx firebase-tools deploy --only firestore:indexes --project ${{ secrets.PREFLIGHT_FIREBASE_PROJECT_ID }} --non-interactive

      - name: Run preflight against real Firestore
        env:
          NODE_ENV: preflight
          PREFLIGHT_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.PREFLIGHT_FIREBASE_SERVICE_ACCOUNT }}
        run: cd api && bun run preflight

  deploy-api:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run --filter=web build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Firebase (hosting + firestore rules + firestore indexes + RTDB rules)
        run: bunx firebase-tools deploy --only hosting,firestore:rules,firestore:indexes,database --project ${{ secrets.FIREBASE_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"
