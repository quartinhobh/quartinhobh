name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} lint
        continue-on-error: false

      - name: Typecheck ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} typecheck

      - name: Test ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} test

  web-build:
    name: web production build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web
        run: bun run --filter=web build

  emulator-tests:
    name: API tests against Firebase emulators
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Setup Java (Firestore emulator dependency)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install firebase-tools
        run: bun add -g firebase-tools

      - name: Start emulators in background
        run: |
          mkdir -p .firebase-data
          firebase emulators:start \
            --only auth,firestore,database,storage \
            --project=quartinho-dev \
            > /tmp/firebase-emulators.log 2>&1 &
          echo $! > /tmp/emulator.pid

      - name: Wait for emulators (hub + auth + firestore)
        run: |
          for i in {1..60}; do
            HUB_OK=0
            AUTH_OK=0
            FS_OK=0

            curl -sf http://localhost:4400/ >/dev/null && HUB_OK=1 || true
            curl -sf http://127.0.0.1:9099/ >/dev/null && AUTH_OK=1 || true
            curl -sf http://127.0.0.1:8080/ >/dev/null && FS_OK=1 || true

            if [ "$HUB_OK" = "1" ] && [ "$AUTH_OK" = "1" ] && [ "$FS_OK" = "1" ]; then
              echo "emulators ready (hub=$HUB_OK auth=$AUTH_OK firestore=$FS_OK)"
              exit 0
            fi

            sleep 2
          done

          echo "emulators did not come up in time"
          cat /tmp/firebase-emulators.log || true
          exit 1

      - name: Dump emulator logs on failure
        if: failure()
        run: |
          echo "==== firebase emulators log ===="
          cat /tmp/firebase-emulators.log || true

      - name: Run emulator-gated API tests
        env:
          FIREBASE_PROJECT_ID: quartinho-dev
          GCLOUD_PROJECT: quartinho-dev
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_DATABASE_EMULATOR_HOST: localhost:9000
          FIREBASE_STORAGE_EMULATOR_HOST: localhost:9199
        run: bun run --filter=api test -- --no-file-parallelism

      - name: Stop emulators
        if: always()
        run: |
          if [ -f /tmp/emulator.pid ]; then
            kill "$(cat /tmp/emulator.pid)" 2>/dev/null || true
          fi
          pkill -f "firebase emulators" 2>/dev/null || true
